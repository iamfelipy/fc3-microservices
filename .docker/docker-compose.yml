services:
  plantuml-c4model:
    container_name: plantuml-c4model
    image: plantuml/plantuml-server
    ports:
      - "8080:8080"
    networks:
      - microservices-net
  fc3-microservice:
    container_name: fc3-microservice
    build: 
      # context: .
      dockerfile: ./Dockerfile.dev
    volumes:
      - ../:/workspace
    working_dir: /workspace
    networks:
      - microservices-net
  mysql:
    image: mysql:5.7
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wallet
      MYSQL_PASSWORD: root
    ports:
      - 3306:3306
    volumes:
      - ./mysql:/var/lib/mysql
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge